services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_KEY: ${API_KEY_PUBLIC}
        VITE_API_BASE: ""
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
